<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study2Gether | Editar Perfil</title>
  <link rel="stylesheet" href="style.claro.css">
</head>
<body>
  <a href="#conteudo">Pular para o conteúdo</a>

  <header>
    <h1>Study2Gether</h1>
    <nav aria-label="Menu Principal">
      <ul>
        <li><a href="index.html">Início</a></li>
        <li><a href="biblioteca.html">Biblioteca</a></li>
        <li><a href="salas.html">Salas</a></li>
        <li><a href="comunidade.html">Comunidade</a></li>
        <li><a href="calendario.html">Calendário</a></li>
      </ul>
    </nav>
  </header>

  <main id="conteudo">
    <section>
      <h2>Editar Perfil</h2>

      <form action="#" method="post">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome">

        <label for="status">Status</label>
        <input type="text" id="status" name="status">

        <label for="instituicao">Instituição</label>
        <input type="text" id="instituicao" name="instituicao">

        <label for="curso">Curso</label>
        <input type="text" id="curso" name="curso">

        <label for="semestre">Semestre</label>
        <input type="text" id="semestre" name="semestre">

        <label for="interesses">Interesses</label>
        <textarea id="interesses" name="interesses" rows="4"></textarea>

        <button type="submit">Salvar alterações</button>
      </form>
    </section>
  </main>
</body>
</html>
